<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hush · Daily Journal</title>
  <meta name="description" content="Hush is a reflective journaling app. One coach-written question, every day. No AI.">
  <style>
    :root {
      --bg: #FCFBF7;
      --text: #1F1A14;
      --muted: #6B6258;
      --accent: #1D5751;
      --amber: #C8A567;
      --border: #E5DFD3;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      line-height: 1.65;
      font-size: 16px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .wrap {
      max-width: 560px;
      margin: 0 auto;
      padding: 96px 24px 48px;
      text-align: center;
      flex: 1;
    }
    h1 {
      font-family: Georgia, "Cormorant Garamond", serif;
      font-size: 56px;
      font-weight: 500;
      letter-spacing: 0.3px;
      margin: 0 0 12px;
      color: var(--accent);
    }
    .tagline {
      font-size: 18px;
      color: var(--text);
      margin-bottom: 8px;
    }
    .sub {
      font-size: 15px;
      color: var(--muted);
      margin-bottom: 64px;
    }
    .links {
      display: flex;
      flex-direction: column;
      gap: 16px;
      align-items: center;
    }
    .links a {
      color: var(--accent);
      text-decoration: none;
      font-size: 16px;
      padding: 12px 24px;
      border: 1px solid var(--border);
      border-radius: 8px;
      min-width: 200px;
    }
    .links a:hover {
      background: var(--border);
    }
    .footer {
      text-align: center;
      padding: 24px;
      font-size: 13px;
      color: var(--muted);
      border-top: 1px solid var(--border);
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Hush</h1>
    <p class="tagline">Coach-written prompts. No AI.</p>
    <p class="sub">A reflective journaling app — one question, every day.</p>

    <div class="links">
      <a href="./privacy.html">Privacy Policy</a>
      <a href="./terms.html">Terms of Service</a>
    </div>
  </div>
  <div class="footer">
    Hush · Daily Journal — by Sera Dilara Ceylan, Certified Co-Active® Coach.
  </div>
</body>
</html>
